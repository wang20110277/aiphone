global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'asr-adapter'
    static_configs:
      - targets: ['localhost:8080']

  - job_name: 'tts-adapter'
    static_configs:
      - targets: ['localhost:8081']

  - job_name: 'freeswitch'
    static_configs:
      - targets: ['localhost:9282']
