groups:
  - name: smart_outbound_call
    rules:
      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 3.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM 响应延迟过高"
          description: "95 分位延迟超过 3 秒"

      - alert: HighASRFailureRate
        expr: rate(asr_recognition_failures_total[5m]) / rate(asr_recognition_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ASR 识别失败率过高"
          description: "失败率超过 10%"

      - alert: ESLConnectionDown
        expr: up{job="orchestrator"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Orchestrator 服务不可用"
          description: "ESL 连接断开超过 2 分钟"

      - alert: HighHandoffRate
        expr: rate(call_handoff_total[10m]) / rate(call_total[10m]) > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "转人工率过高"
          description: "10 分钟内转人工率超过 30%"

      - alert: ComplianceBlockSpike
        expr: rate(compliance_blocks_total[5m]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "合规拦截量激增"
          description: "5 分钟内合规拦截超过 10 次"
